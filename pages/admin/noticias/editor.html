<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editor de Noticias - CMS</title>
  <link rel="icon" type="image/x-icon" href="https://res.cloudinary.com/dvdik8dux/image/upload/v1770605599/logo-nuevo-San-Marino-fondo-blanco_skhsnn.ico">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <link rel="stylesheet" href="../../../css/styles.css">
  <link rel="stylesheet" href="https://cdn.quilljs.com/1.3.6/quill.snow.css">
  <link rel="stylesheet" href="./editor.css?v=20260307b">
</head>
<body>
  <header class="header editor-header">
    <div class="container editor-header-inner">
      <div class="editor-brand">
        <img src="https://res.cloudinary.com/dvdik8dux/image/upload/v1770605599/logo-nuevo-San-Marino-fondo-blanco_skhsnn.ico" alt="Logo San Marino" class="editor-logo">
        <div>
          <h1>Editor de Noticias</h1>
          <p id="modeLabel">Modo: Crear noticia</p>
        </div>
      </div>
      <div class="editor-nav">
        <a href="../dashboard.html" class="nav-btn nav-btn-outline"><i class="fas fa-arrow-left"></i> Volver a Admin</a>
        <a href="../../../index.html" class="nav-btn nav-btn-accent"><i class="fas fa-home"></i> Ir al Inicio</a>
      </div>
    </div>
  </header>

  <main class="editor-layout container">
    <section class="editor-card">
      <h2><i class="fas fa-pen-to-square"></i> Editor CMS de Noticias</h2>

      <form id="newsForm" class="editor-form">
        <div class="fields-grid">
          <label>
            <span>Titulo</span>
            <input id="titulo" type="text" maxlength="255" required>
          </label>

          <label>
            <span>Categoria</span>
            <select id="categoria" required>
              <option value="">Seleccionar...</option>
              <option value="institucional">Institucional</option>
              <option value="academico">Academico</option>
              <option value="deportes">Deportes</option>
              <option value="cultural">Cultural</option>
              <option value="comunidad">Comunidad</option>
              <option value="eventos">Eventos</option>
            </select>
          </label>

          <label>
            <span>Autor</span>
            <input id="autor" type="text" maxlength="100" placeholder="IPSM">
          </label>

          <label>
            <span>Imagen URL</span>
            <input id="imagen_url" type="url" placeholder="https://...">
          </label>

          <label>
            <span>Imagen ALT</span>
            <input id="imagen_alt" type="text" maxlength="200" placeholder="Descripcion accesible">
          </label>

          <label class="checkbox-inline">
            <input id="publicada" type="checkbox">
            <span>Publicada</span>
          </label>
        </div>

        <label>
          <span>Resumen</span>
          <textarea id="resumen" rows="3" placeholder="Resumen breve"></textarea>
        </label>

        <label>
          <span>Programar publicacion</span>
          <input id="fecha_programada" type="datetime-local">
        </label>

        <div class="content-header">
          <span>Contenido</span>
          <div class="content-tools">
            <button type="button" id="btnInsertImageUrl" class="tool-btn"><i class="fas fa-image"></i> Imagen por URL</button>
            <button type="button" id="btnInsertEmbed" class="tool-btn"><i class="fas fa-video"></i> Embed YouTube</button>
          </div>
        </div>

        <div id="editor"></div>

        <div class="actions-grid">
          <button type="button" id="btnDraft" class="editor-btn btn-secondary"><i class="fas fa-floppy-disk"></i> Guardar borrador</button>
          <button type="button" id="btnUploadNews" class="editor-btn btn-accent"><i class="fas fa-cloud-arrow-up"></i> Subir noticia</button>
          <button type="button" id="btnSchedule" class="editor-btn btn-primary"><i class="fas fa-clock"></i> Programar publicacion</button>
          <button type="button" id="btnUpdate" class="editor-btn btn-outline" disabled><i class="fas fa-pen"></i> Actualizar noticia</button>
        </div>

        <p id="status" class="status" aria-live="polite"></p>
      </form>
    </section>

    <section class="editor-card">
      <h2><i class="fas fa-eye"></i> Preview</h2>
      <article class="preview-article">
        <p id="previewCategoria" class="preview-category"></p>
        <h3 id="previewTitulo">Titulo de noticia</h3>
        <p id="previewMeta" class="preview-meta"></p>
        <img id="previewImagen" class="preview-image" alt="" hidden>
        <p id="previewResumen" class="preview-summary"></p>
        <div id="previewContenido" class="preview-content"></div>
      </article>
    </section>
  </main>

  <script src="../../../js/config.js"></script>
  <script src="../../../js/api.js"></script>
  <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
  <script src="./editor.js?v=20260307b"></script>
</body>
</html>
