<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CMS Noticias - Editor</title>
  <link rel="icon" type="image/x-icon" href="https://res.cloudinary.com/dvdik8dux/image/upload/v1770605599/logo-nuevo-San-Marino-fondo-blanco_skhsnn.ico">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <link rel="stylesheet" href="../../../css/styles.css">
  <link rel="stylesheet" href="../../../css/home.css">
  <link rel="stylesheet" href="https://cdn.quilljs.com/1.3.6/quill.snow.css">
  <link rel="stylesheet" href="./editor.css">
</head>
<body>
  <main class="layout">
    <section class="panel">
      <header class="panel-header">
        <h1><i class="fas fa-newspaper"></i> Editor CMS de Noticias</h1>
        <p id="modeLabel">Modo: Crear noticia</p>
      </header>

      <form id="newsForm" class="news-form">
        <div class="grid">
          <label>
            <span>Título</span>
            <input id="titulo" type="text" maxlength="255" required>
          </label>

          <label>
            <span>Categoría</span>
            <select id="categoria" required>
              <option value="">Seleccionar...</option>
              <option value="institucional">Institucional</option>
              <option value="academico">Académico</option>
              <option value="deportes">Deportes</option>
              <option value="cultural">Cultural</option>
              <option value="comunidad">Comunidad</option>
              <option value="eventos">Eventos</option>
            </select>
          </label>

          <label>
            <span>Autor</span>
            <input id="autor" type="text" maxlength="100" placeholder="Instituto San Marino">
          </label>

          <label>
            <span>Imagen URL</span>
            <input id="imagen_url" type="url" placeholder="https://...">
          </label>

          <label>
            <span>Imagen ALT</span>
            <input id="imagen_alt" type="text" maxlength="200" placeholder="Descripción accesible de imagen">
          </label>

          <label class="checkbox">
            <input id="publicada" type="checkbox">
            <span>Publicada</span>
          </label>
        </div>

        <label>
          <span>Resumen</span>
          <textarea id="resumen" rows="3" placeholder="Resumen breve"></textarea>
        </label>

        <label>
          <span>Programar publicación</span>
          <input id="fecha_programada" type="datetime-local">
        </label>

        <div>
          <span class="field-title">Contenido</span>
          <div id="editor"></div>
        </div>

        <div class="actions">
          <button type="button" id="btnDraft"><i class="fas fa-save"></i> Guardar borrador</button>
          <button type="button" id="btnUploadNews" class="primary"><i class="fas fa-cloud-upload-alt"></i> Subir noticia</button>
          <button type="button" id="btnSchedule" class="secondary"><i class="fas fa-clock"></i> Programar publicación</button>
          <button type="button" id="btnUpdate" class="secondary" disabled><i class="fas fa-pen"></i> Actualizar noticia</button>
        </div>

        <p id="status" class="status" aria-live="polite"></p>
      </form>
    </section>

    <section class="panel preview-panel">
      <header class="panel-header preview-head">
        <h2><i class="fas fa-eye"></i> Preview con noticia-detalle.html</h2>
        <a id="btnOpenPreview" class="btn-link" href="../../noticia-detalle.html?preview=1" target="_blank" rel="noopener">Abrir en pestaña</a>
      </header>
      <iframe id="previewFrame" src="../../noticia-detalle.html?preview=1" title="Preview noticia"></iframe>
    </section>
  </main>

  <script src="../../../js/config.js"></script>
  <script src="../../../js/api.js"></script>
  <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
  <script src="./editor.js"></script>
</body>
</html>
