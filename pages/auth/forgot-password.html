<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña - Instituto San Marino</title>
    
    <link rel="icon" type="image/x-icon" href="https://res.cloudinary.com/dvdik8dux/image/upload/v1770605599/logo-nuevo-San-Marino-fondo-blanco_skhsnn.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="stylesheet" href="../../css/styles.css">
    <link rel="stylesheet" href="../../css/register.css">
    <link rel="stylesheet" href="../../css/reset-password.css">
</head>
<body class="register-page">
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="../../index.html" class="logo-link">
                    <img src="https://res.cloudinary.com/dvdik8dux/image/upload/v1770605599/logo-nuevo-San-Marino-fondo-blanco_skhsnn.ico" alt="Logo Instituto San Marino" class="logo">
                    <span class="site-title">Instituto San Marino</span>
                </a>
            </div>
        </div>
    </header>

    <div class="register-main">
        <div class="container">
            <div id="resetRequestContainer" class="register-container">
                <div class="register-card">
                    <div class="register-header">
                        <div class="register-icon">
                            <i class="fas fa-key"></i>
                        </div>
                        <h1>Restablecer Contraseña</h1>
                        <p>Ingresá tu DNI para recibir el enlace</p>
                    </div>

                    <div class="register-form">
                        <form id="resetRequestForm">
                            <div class="form-group">
                                <label for="dni">
                                    DNI <span class="required">*</span>
                                </label>
                                <input 
                                    type="text" 
                                    id="dni" 
                                    name="dni"
                                    placeholder="12345678"
                                    required
                                    maxlength="8"
                                    pattern="[0-9]{7,8}"
                                >
                                <span class="input-hint">Sin puntos ni guiones</span>
                            </div>

                            <button type="submit" class="btn-submit" id="submitBtn">
                                <i class="fas fa-paper-plane"></i>
                                <span>Enviar enlace</span>
                            </button>
                        </form>

                        <div class="form-footer">
                            <p>¿Ya tenés cuenta? <a href="login.html">Iniciar sesión</a></p>
                        </div>
                    </div>
                </div>
            </div>

            <div id="resetRequestSuccess" class="success-container" style="display: none;">
                <div class="success-content">
                    <div class="success-icon-large">
                        <i class="fas fa-check-circle"></i>
                    </div>
                    <h1 class="success-title">Solicitud enviada</h1>
                    <p class="success-message">
                        Si el DNI existe, recibirás un email con instrucciones.
                    </p>
                    <div class="success-actions">
                        <a href="login.html" class="btn btn-primary btn-lg">
                            <i class="fas fa-sign-in-alt"></i> Ir al Login
                        </a>
                        <a href="../../index.html" class="btn btn-outline-primary btn-lg">
                            <i class="fas fa-home"></i> Volver al Inicio
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Loader -->
    <div class="loader" id="loader">
        <div class="loader-content">
            <div class="loader-spinner"></div>
            <p>Procesando...</p>
        </div>
    </div>
    <script src="../../js/config.js"></script>
    <script src="../../js/api.js"></script>
    <script src="../../js/forgot-password.js"></script>
</body>
</html>
