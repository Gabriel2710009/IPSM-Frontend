<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Definir Nueva Contraseña - Instituto San Marino</title>
    
    <link rel="icon" type="image/x-icon" href="https://res.cloudinary.com/dvdik8dux/image/upload/v1770605599/logo-nuevo-San-Marino-fondo-blanco_skhsnn.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="stylesheet" href="../../css/styles.css">
    <link rel="stylesheet" href="../../css/register.css">
    <link rel="stylesheet" href="../../css/reset-password.css">
</head>
<body class="register-page">
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="../../index.html" class="logo-link">
                    <img src="https://res.cloudinary.com/dvdik8dux/image/upload/v1770605599/logo-nuevo-San-Marino-fondo-blanco_skhsnn.ico" alt="Logo Instituto San Marino" class="logo">
                    <span class="site-title">Instituto San Marino</span>
                </a>
            </div>
        </div>
    </header>

    <div class="register-main">
        <div class="container">
            <div id="resetContainer" class="register-container">
                <div class="register-card">
                    <div class="register-header">
                        <div class="register-icon">
                            <i class="fas fa-lock"></i>
                        </div>
                        <h1>Nueva Contraseña</h1>
                        <p>Definí una contraseña segura</p>
                    </div>

                    <div class="register-form">
                        <form id="resetPasswordForm">
                            <div class="form-group">
                                <label for="password">
                                    Contraseña <span class="required">*</span>
                                </label>
                                <div class="password-wrapper">
                                    <input 
                                        type="password" 
                                        id="password" 
                                        name="password"
                                        placeholder="••••••••"
                                        required
                                        minlength="8"
                                    >
                                    <button type="button" class="password-toggle" id="togglePassword">
                                        <i class="far fa-eye"></i>
                                    </button>
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="confirmPassword">
                                    Confirmar Contraseña <span class="required">*</span>
                                </label>
                                <div class="password-wrapper">
                                    <input 
                                        type="password" 
                                        id="confirmPassword" 
                                        name="confirmPassword"
                                        placeholder="••••••••"
                                        required
                                        minlength="8"
                                    >
                                    <button type="button" class="password-toggle" id="toggleConfirm">
                                        <i class="far fa-eye"></i>
                                    </button>
                                </div>
                            </div>

                            <button type="submit" class="btn-submit" id="submitBtn">
                                <i class="fas fa-save"></i>
                                <span>Actualizar contraseña</span>
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <div id="resetSuccess" class="success-container" style="display: none;">
                <div class="success-content">
                    <div class="success-icon-large">
                        <i class="fas fa-check-circle"></i>
                    </div>
                    <h1 class="success-title">Contraseña actualizada</h1>
                    <p class="success-message">Ya podés iniciar sesión con tu nueva contraseña.</p>
                    <div class="success-actions">
                        <a href="login.html" class="btn btn-primary btn-lg">
                            <i class="fas fa-sign-in-alt"></i> Ir al Login
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Loader -->
    <div class="loader" id="loader">
        <div class="loader-content">
            <div class="loader-spinner"></div>
            <p>Procesando...</p>
        </div>
    </div>
    <script src="../../js/config.js"></script>
    <script src="../../js/api.js"></script>
    <script src="../../js/reset-password.js"></script>
</body>
</html>
